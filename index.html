<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SAV Fnac - Expert Connect</title>
    <style>
        :root {
            --fnac-yellow: #EBC800;
            --fnac-black: #1a1a1a;
            --light-gray: #f8f8f8;
            --success-green: #27ae60;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            margin: 0;
            background-color: var(--light-gray);
            color: var(--fnac-black);
            display: flex;
            justify-content: center;
        }

        /* Conteneur type Smartphone */
        .app-shell {
            width: 100%;
            max-width: 500px;
            min-height: 100vh;
            background: white;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        /* Header pro qui prend toute la largeur */
        header {
            background: var(--fnac-black);
            color: var(--fnac-yellow);
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--fnac-yellow);
        }

        .brand { font-size: 32px; font-weight: 900; letter-spacing: 2px; }
        
        .container { padding: 30px; flex-grow: 1; }

        /* Style des entrées */
        .form-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            color: #999;
            margin-bottom: 8px;
            display: block;
        }

        input, select {
            width: 100%;
            padding: 16px;
            margin-bottom: 25px;
            border: 1px solid #e0e0e0;
            border-radius: 12px;
            background: #fafafa;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--fnac-yellow); outline: none; background: white; }

        /* Bouton Fnac imposant */
        .btn-primary {
            background: var(--fnac-black);
            color: white;
            width: 100%;
            padding: 20px;
            border: none;
            border-radius: 15px;
            font-size: 16px;
            font-weight: bold;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-primary:hover { background: #333; transform: translateY(-2px); }

        /* DESIGN DU TICKET (Effet Pro) */
        #ticket-view { display: none; animation: fadeIn 0.6s ease-out; text-align: center; }

        .ticket-card {
            background: #fffdf0;
            border-radius: 20px;
            padding: 30px;
            margin: 20px 0;
            box-shadow: 0 10px 30px rgba(235, 200, 0, 0.15);
            border: 1px solid #f0e0a0;
            position: relative;
        }

        /* Effet encoche sur les côtés du ticket */
        .ticket-card::before, .ticket-card::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            background: white; border-radius: 50%; top: 50%; transform: translateY(-50%);
        }
        .ticket-card::before { left: -11px; }
        .ticket-card::after { right: -11px; }

        .ticket-num { font-size: 50px; font-weight: 900; margin: 10px 0; color: var(--fnac-black); }
        
        .qr-area {
            background: white;
            padding: 15px;
            display: inline-block;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        .impact-footer {
            margin-top: 30px;
            font-size: 13px;
            color: var(--success-green);
            font-weight: 600;
            background: #e9f7ef;
            padding: 15px;
            border-radius: 12px;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="app-shell">
        <header>
            <div class="brand">FNAC</div>
            <div style="font-size: 12px; margin-top: 5px; opacity: 0.8; color: white;">Espace Client SAV</div>
        </header>

        <div class="container">
            <div id="form-view">
                <h2 style="font-size: 24px; margin-bottom: 5px;">Planifiez votre passage</h2>
                <p style="color: #777; margin-bottom: 30px; font-size: 14px;">Évitez l'attente, réservez en 1 clic.</p>

                <span class="form-label">Nom Complet</span>
                <input type="text" id="name" placeholder="Ex: Lucas Bernard">

                <span class="form-label">Nature du problème</span>
                <select id="reason">
                    <option value="Reparation">🛠️ Réparation / Panne</option>
                    <option value="Retrait">📦 Retrait de commande</option>
                    <option value="Echange">🔄 Échange ou Retour</option>
                </select>

                <span class="form-label">Heure souhaitée</span>
                <input type="time" id="time" value="15:00">

                <button class="btn-primary" onclick="showTicket()">Générer mon Pass SAV</button>
            </div>

            <div id="ticket-view">
                <div style="font-size: 40px; margin-bottom: 10px;">✅</div>
                <h2 style="margin: 0;">Pass Activé !</h2>
                <p style="color: #777; font-size: 14px;">Présentez ce ticket en zone SAV.</p>

                <div class="ticket-card">
                    <span style="font-size: 11px; font-weight: 800; color: #999; text-transform: uppercase;">Numéro de Passage</span>
                    <div class="ticket-num" id="t-id">S-34</div>
                    <div id="t-user" style="font-weight: bold; font-size: 18px;"></div>
                    <div id="t-time" style="color: #777; margin-bottom: 15px;"></div>
                    
                    <div class="qr-area">
                        <img id="qr-img" src="" alt="QR" style="width: 130px; display: block;">
                    </div>
                </div>

                <div class="impact-footer">
                    🚀 <b>Impact :</b> Votre créneau est réservé. <br>Temps d'attente estimé : < 5 minutes.
                </div>

                <button onclick="location.reload()" style="margin-top: 20px; background: none; border: none; color: #999; font-weight: bold; cursor: pointer; text-decoration: underline;">Annuler et revenir</button>
            </div>
        </div>
    </div>

    <script>
        function showTicket() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;

            if(!name) { alert("Veuillez entrer votre nom."); return; }

            const id = "S-" + Math.floor(Math.random() * 90 + 10);
            
            document.getElementById('t-id').innerText = id;
            document.getElementById('t-user').innerText = name;
            document.getElementById('t-time').innerText = "Aujourd'hui à " + time;
            document.getElementById('qr-img').src = "https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=" + id;

            document.getElementById('form-view').style.display = 'none';
            document.getElementById('ticket-view').style.display = 'block';
        }
    </script>
</body>
</html>
