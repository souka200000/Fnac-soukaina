<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface SAV Fnac - Système QR Code</title>
    
    <style>
        :root {
            --fnac-yellow: #EBC800;
            --fnac-black: #1a1a1a;
            --fnac-white: #ffffff;
            --success-green: #27ae60;
            --gray-light: #f4f4f4;
        }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: var(--gray-light);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-container {
            background: var(--fnac-white);
            width: 100%;
            max-width: 500px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            overflow: hidden;
            border-top: 8px solid var(--fnac-yellow);
        }

        header {
            background: var(--fnac-black);
            color: var(--fnac-yellow);
            padding: 25px;
            text-align: center;
        }

        header h1 { margin: 0; font-size: 24px; text-transform: uppercase; letter-spacing: 2px; }
        header p { margin: 5px 0 0; color: white; font-size: 14px; opacity: 0.8; }

        .content { padding: 30px; }

        .step-indicator {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
        }

        .step {
            font-size: 12px;
            color: #bbb;
            font-weight: bold;
            text-transform: uppercase;
        }

        .step.active { color: var(--fnac-black); border-bottom: 2px solid var(--fnac-yellow); }

        .form-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, select:focus {
            border-color: var(--fnac-yellow);
            outline: none;
            background: #fffdf0;
        }

        .btn-main {
            background: var(--fnac-black);
            color: var(--fnac-white);
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-main:hover {
            background: #333;
            transform: translateY(-2px);
        }

        /* Message de succès caché au début */
        #success-screen {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .check-icon {
            font-size: 60px;
            color: var(--success-green);
            margin-bottom: 20px;
        }

        .ticket-box {
            background: #f9f9f9;
            border: 2px dashed #ccc;
            padding: 20px;
            margin: 20px 0;
            border-radius: 10px;
        }

        .info-impact {
            background: #e8f4fd;
            color: #2980b9;
            padding: 15px;
            border-radius: 8px;
            font-size: 14px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <header>
            <h1>FNAC SAV</h1>
            <p>File d'attente intelligente via QR Code</p>
        </header>

        <div class="content">
            <div id="booking-form">
                <div class="step-indicator">
                    <span class="step active">1. Motif</span>
                    <span class="step">2. Créneau</span>
                    <span class="step">3. Confirmation</span>
                </div>

                <div class="form-group">
                    <label>Votre Nom complet</label>
                    <input type="text" id="userName" placeholder="Ex: Thomas Durant" required>
                </div>

                <div class="form-group">
                    <label>Motif de votre venue</label>
                    <select id="reason">
                        <option value="reparation">🔧 Réparation / Panne produit</option>
                        <option value="retrait">📦 Retrait de commande (Click & Collect)</option>
                        <option value="echange">🔄 Échange ou Retour</option>
                        <option value="SAV">🛠️ Expertise technique SAV</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Heure de passage souhaitée</label>
                    <input type="time" id="timeSlot" min="10:00" max="19:00" required>
                </div>

                <button class="btn-main" onclick="processBooking()">GÉNÉRER MON TICKET</button>
            </div>

            <div id="success-screen">
                <div class="check-icon">✓</div>
                <h2>Rendez-vous validé !</h2>
                <p>Merci <span id="display-name" style="font-weight: bold;"></span>.</p>
                
                <div class="ticket-box">
                    <p style="margin:0; font-size: 12px; color: #666;">NUMÉRO DE PASSAGE</p>
                    <h3 id="ticket-id" style="font-size: 32px; margin: 10px 0; letter-spacing: 5px;">---</h3>
                    <p id="display-time" style="font-weight: bold; color: var(--fnac-black);"></p>
                </div>

                <div class="info-impact">
                    <strong>Impact positif :</strong> En utilisant ce QR Code, vous réduisez la charge du personnel et votre temps d'attente est estimé à <strong>moins de 4 minutes</strong>.
                </div>
                
                <button class="btn-main" style="background:#777;" onclick="location.reload()">ANNULER / RETOUR</button>
            </div>
        </div>
    </div>

    <script>
        function processBooking() {
            const name = document.getElementById('userName').value;
            const time = document.getElementById('timeSlot').value;
            const reason = document.getElementById('reason').value;

            if (name === "" || time === "") {
                alert("Veuillez remplir tous les champs avant de valider.");
                return;
            }

            // Simulation d'une logique de calcul de ticket
            const randomID = "FNAC-" + Math.floor(Math.random() * 9000 + 1000);
            
            // Masquer le formulaire, afficher le succès
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';

            // Injection des données dynamiques
            document.getElementById('display-name').innerText = name;
            document.getElementById('display-time').innerText = "Présentez-vous à " + time;
            document.getElementById('ticket-id').innerText = randomID;

            // Console log pour prouver la logique de dev
            console.log("Réservation enregistrée pour:", name, "Motif:", reason, "Ticket:", randomID);
        }
    </script>
</body>
</html>
