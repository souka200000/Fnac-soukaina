<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fnac SAV - Système de Gestion Digital v3.0</title>
    
    <style>
        :root {
            --fnac-yellow: #EBC800;
            --fnac-black: #1a1a1a;
            --bg: #f4f7f6;
            --success: #2ecc71; /* Un vert plus doux et pro */
            --text-main: #333;
            --text-muted: #666;
        }

        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        /* Conteneur principal */
        .card {
            background: white;
            width: 90%;
            max-width: 440px;
            border-radius: 28px;
            box-shadow: 0 15px 40px rgba(0,0,0,0.12);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        header {
            background: var(--fnac-black);
            padding: 30px;
            text-align: center;
        }

        .logo { color: var(--fnac-yellow); font-size: 28px; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; }

        .content { padding: 35px; }

        h2 { margin-top: 0; font-size: 22px; font-weight: 800; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 22px; }
        label { display: block; font-size: 12px; font-weight: 700; color: #888; text-transform: uppercase; margin-bottom: 8px; }

        input, select {
            width: 100%;
            padding: 15px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.3s;
            color: var(--text-main);
        }

        input:focus { border-color: var(--fnac-yellow); outline: none; background: white; }

        .btn {
            background: var(--fnac-black);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 14px;
            font-size: 16px;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn:hover { background: #333; transform: translateY(-2px); }

        /* Écran de succès (caché par défaut) */
        #success-screen { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        
        /* STYLE DE L'ICÔNE DE SUCCÈS (SVG) */
        .success-icon {
            width: 70px;
            height: 70px;
            background-color: var(--success);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        }
        
        /* Icône de coche */
        .success-icon::after {
            content: '';
            display: block;
            width: 18px;
            height: 35px;
            border: solid white;
            border-width: 0 5px 5px 0;
            transform: rotate(45deg);
            margin-top: -5px;
        }

        .ticket {
            border: 2px dashed #ddd;
            padding: 25px;
            border-radius: 16px;
            margin: 25px 0;
            background: #fffdf5;
        }

        .ticket-num { font-size: 40px; font-weight: 900; margin: 10px 0; letter-spacing: 3px; color: var(--fnac-black); }

        .impact-badge {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 700;
            margin-top: 15px;
            display: inline-block;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card" id="app-card">
        <header>
            <div class="logo">FNAC</div>
        </header>

        <div class="content">
            <div id="booking-form">
                <h2>Planifiez votre passage</h2>
                <p class="subtitle">Réduction du temps d'attente estimée : 15 min.</p>
                
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" id="name" placeholder="Ex: Lucas Bernard">
                </div>

                <div class="form-group">
                    <label>Nature du problème</label>
                    <select id="motif">
                        <option value="">Sélectionnez un motif...</option>
                        <option value="reparation">🔧 Réparation / Panne</option>
                        <option value="retour">🔄 Retour / Échange</option>
                        <option value="retrait">📦 Retrait Commande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Heure souhaitée</label>
                    <input type="time" id="time" value="14:00">
                </div>

                <button class="btn" onclick="generatePass()">GÉNÉRER MON PASS SAV</button>
            </div>

            <div id="success-screen">
                <div class="success-icon" aria-label="Validation réussie"></div>
                
                <h2 style="margin: 0;">Pass Activé !</h2>
                <div class="ticket">
                    <p style="margin: 0; color: #888; font-size: 11px; font-weight: 700; text-transform: uppercase;">Numéro de Passage</p>
                    <div class="ticket-num" id="ticket-id">A-24</div>
                    <div id="client-info" style="font-weight: 700; font-size: 16px;"></div>
                    <img id="qr-code" src="" alt="QR Code" style="width: 120px; margin-top: 15px;">
                </div>
                
                <div class="impact-badge">
                    🚀 Impact : Temps d'attente optimisé.
                </div>
                
                <button class="btn" style="background: #eee; color: #666; margin-top: 25px;" onclick="location.reload()">RETOUR</button>
            </div>
        </div>
    </div>

    <script>
        // Simule la génération d'un pass avec un vrai QR Code
        function generatePass() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;

            if(!name || !time) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            const ticketNum = "S-" + Math.floor(Math.random() * 90 + 10);
            
            // Mise à jour des infos
            document.getElementById('ticket-id').innerText = ticketNum;
            document.getElementById('client-info').innerText = name + " à " + time;
            
            // Génération d'un QR code réel via une API gratuite
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${ticketNum}-${name}`;

            // Transition
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        }
    </script>
</body>
</html>
