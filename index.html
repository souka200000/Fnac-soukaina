<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fnac SAV - Système de Gestion Digital</title>
    <style>
        :root {
            --fnac-yellow: #EBC800;
            --fnac-black: #1a1a1a;
            --bg: #f4f7f6;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Carte principale */
        .card {
            background: white;
            width: 90%;
            max-width: 450px;
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            overflow: hidden;
            transition: all 0.4s ease;
        }

        header {
            background: var(--fnac-black);
            padding: 30px;
            text-align: center;
            position: relative;
        }

        .logo { color: var(--fnac-yellow); font-size: 28px; font-weight: 900; letter-spacing: 2px; }

        /* Barre de progression dynamique */
        .progress-container {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 5px;
            width: 100%;
            background: #333;
        }
        #progress-bar {
            height: 100%;
            width: 20%;
            background: var(--fnac-yellow);
            transition: width 0.5s ease;
        }

        .content { padding: 35px; }

        h2 { margin-top: 0; font-size: 22px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }

        .form-group { margin-bottom: 20px; }
        label { display: block; font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; margin-bottom: 8px; }

        input, select {
            width: 100%;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 16px;
            background: #fafafa;
            transition: 0.3s;
        }

        input:focus { border-color: var(--fnac-yellow); outline: none; background: white; }

        .btn {
            background: var(--fnac-black);
            color: white;
            width: 100%;
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn:hover { background: #333; transform: translateY(-2px); }

        /* Écran de succès (caché par défaut) */
        #success-screen { display: none; text-align: center; animation: fadeIn 0.5s ease; }
        
        .ticket {
            border: 2px dashed var(--fnac-yellow);
            padding: 20px;
            border-radius: 15px;
            margin: 20px 0;
            background: #fffdf0;
        }

        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body>

    <div class="card" id="app-card">
        <header>
            <div class="logo">FNAC</div>
            <div class="progress-container"><div id="progress-bar"></div></div>
        </header>

        <div class="content">
            <div id="booking-form">
                <h2>Planifiez votre passage</h2>
                <p class="subtitle">Réduction du temps d'attente estimée : 15 min.</p>
                
                <div class="form-group">
                    <label>Nom Complet</label>
                    <input type="text" id="name" placeholder="Ex: Lucas Bernard" oninput="updateProgress()">
                </div>

                <div class="form-group">
                    <label>Nature du problème</label>
                    <select id="motif" onchange="updateProgress()">
                        <option value="">Sélectionnez un motif...</option>
                        <option value="reparation">🔧 Réparation / Panne</option>
                        <option value="retour">🔄 Retour / Échange</option>
                        <option value="retrait">📦 Retrait Commande</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Heure souhaitée</label>
                    <input type="time" id="time" oninput="updateProgress()">
                </div>

                <button class="btn" onclick="generatePass()">GÉNÉRER MON PASS SAV</button>
            </div>

            <div id="success-screen">
                <div style="font-size: 50px;">✅</div>
                <h2 style="margin: 10px 0;">Pass Activé !</h2>
                <div class="ticket">
                    <p style="margin: 0; color: #888; font-size: 12px;">VOTRE NUMÉRO DE PASSAGE</p>
                    <h3 id="ticket-id" style="font-size: 36px; margin: 10px 0; letter-spacing: 3px;">--</h3>
                    <p id="client-info" style="font-weight: bold;"></p>
                    <img id="qr-code" src="" alt="QR Code" style="width: 120px; margin-top: 10px;">
                </div>
                <p style="font-size: 13px; color: #27ae60; font-weight: bold;">🚀 Impact : Temps d'attente optimisé.</p>
                <button class="btn" style="background: #eee; color: #666;" onclick="location.reload()">RETOUR</button>
            </div>
        </div>
    </div>

    <script>
        // Met à jour la barre jaune en fonction des champs remplis
        function updateProgress() {
            let fields = [document.getElementById('name').value, document.getElementById('motif').value, document.getElementById('time').value];
            let filled = fields.filter(f => f !== "").length;
            let width = 20 + (filled * 26.6); // De 20% à 100%
            document.getElementById('progress-bar').style.width = width + "%";
        }

        // Simule la génération d'un pass avec un vrai QR Code
        function generatePass() {
            const name = document.getElementById('name').value;
            const time = document.getElementById('time').value;

            if(!name || !time) {
                alert("Veuillez remplir tous les champs.");
                return;
            }

            const ticketNum = "S-" + Math.floor(Math.random() * 90 + 10);
            
            // Mise à jour des infos
            document.getElementById('ticket-id').innerText = ticketNum;
            document.getElementById('client-info').innerText = name + " à " + time;
            
            // Génération d'un QR code réel via une API gratuite
            document.getElementById('qr-code').src = `https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=${ticketNum}-${name}`;

            // Transition
            document.getElementById('booking-form').style.display = 'none';
            document.getElementById('success-screen').style.display = 'block';
        }
    </script>
</body>
</html>
